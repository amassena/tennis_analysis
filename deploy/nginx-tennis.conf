# nginx configuration for tennis.playfullife.com
# Deploy to: /etc/nginx/sites-available/tennis.playfullife.com
# Enable with: ln -s /etc/nginx/sites-available/tennis.playfullife.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tennis.playfullife.com;

    # Redirect HTTP to HTTPS (uncomment after certbot setup)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

